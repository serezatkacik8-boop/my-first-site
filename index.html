<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой сайт</title>
  <style>
    .card {background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 300px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    body {
      background:#0f172a;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }
    h1 {
      color: #00ff88;
    }
    button {
      padding: 10px 20px;
      background: #00ff88;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Привет, я Сергей 👋</h1>
    <p>Это мой первый сайт</p>
    <h2 id="count">0</h2>
    <button onclick="addClick()">Лайк 👍</button>
  </div>
  <script>
    let count = 0;

    function addClick() {
      count++;
      document.getElementById('count').innerText = count;
    }
  </script>
  
</body>
</html>
