<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сергей | Мой сайт</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="avatar">S</div>
      <h1>Сергей 👋</h1>
      <p>Я учусь делать сайт и работать с GitHub</p>
      <p>Это мой первый сайт-портфолио</p>

      <div id="count">0</div>

      <div class="buttons">
        <button onclick="addClick()">Лайк 👋</button>
        <a href="https://github.com/" target="_blank">Мой GitHub</a>
      </div>
    </div>

    <div class="projects">
      <div class="projects-card">
        <h3>Проект 1</h3>
        <p>Мой первый HTML-сайт.</p>
      </div>

      <div class="projects-card">
        <h3>Проект 2</h3>
        <p>Страница со стилями и кнопкой.</p>
      </div>

      <div class="project-card">
        <h3>Проект 3</h3>
        <p>Сайт со счётчиком кликов</p>
      </div>
    </div>
  </div>

  <script>
    let count = 0;

    function addClick() {
      count++;
      document.getElementById('count').textContent = count;
    }
  </script>
</body>
</html>
