<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сергей | Мой сайт</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <img src="images/avatar.jpg" alt="avatar" class="avatar">
      <h1>Сергей 👋</h1>
      <p>Я учусь делать сайт и работать с GitHub</p>
      <p>Это мой первый сайт-портфолио</p>

      <div id="count"></div>

      <div class="buttons">
        <button onclick="toggleLike()" id="likeBtn">
          ❤️ Лайк
        </button>
        <a href="https://github.com/" target="_blank">Мой GitHub</a>
      </div>
    </div>

    <div class="projects">
      <div class="projects-card">
        <h3>Проект 1</h3>
        <p>Мой первый HTML-сайт.</p>
      </div>

      <div class="projects-card">
        <h3>Проект 2</h3>
        <p>Страница со стилями и кнопкой.</p>
      </div>

      <div class="projects-card">
        <h3>Проект 3</h3>
        <p>Сайт со счётчиком кликов</p>
      </div>
    </div>
    <div class="card">
      <h2>Связаться со мной</h2>

      <div class="buttons">
        <a href="https://t.me/@serezatkacik" target="_blank">Telegram</a>
        <a href="mailto:serezatkacik8@gmail.com" target="_blank">Email</a>
      </div>
    </div>
    <div class="card">
      <h2>Мини-игра 🎮</h2>

      <p>Угодай число от 1 до 5</p>

      <input type="number" id="guessInput">
      <button onclick="checkGuess()">Проверить</button>

      <div id="result"></div>
    </div>
    <div class="card">
      <h2>Связаться со мной 🧾</h2>

      <input type="text" id="nameInput" placeholder="Твоё имя">
      <input type="text" id="messageInput" placeholder="Сообщение">

      <button onclick="sendForm()">Отправить</button>

      <p id="formResult"></p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
